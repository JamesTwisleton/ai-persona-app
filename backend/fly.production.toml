app = "persona-composer-be"
primary_region = "lhr"

[build]
dockerfile = "Dockerfile"

[processes]
app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[checks]
[checks.health]
type = "http"
port = 8000
path = "/health"
interval = "10s"
timeout = "5s"
grace_period = "30s"
processes = ["app"]

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"

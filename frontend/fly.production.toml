app = "persona-composer-fe"
primary_region = "lhr"

[build]
dockerfile = "Dockerfile"

[build.args]
NEXT_PUBLIC_API_URL = "https://api.personacomposer.app"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"

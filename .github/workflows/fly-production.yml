name: Production Deploy (Fly.io)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  backend-deploy:
    name: Backend deploy (Fly.io)
    runs-on: ubuntu-latest
    if: vars.DEPLOY_TARGET == 'fly'

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set backend secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            --app persona-composer-be \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            FRONTEND_URL="https://personacomposer.app" \
            GOOGLE_REDIRECT_URI="https://api.personacomposer.app/auth/callback/google" \
            S3_AVATAR_BUCKET="persona-composer-avatars" \
            AWS_DEFAULT_REGION="eu-west-1" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            GEMINI_MODEL_ID="gemini-2.5-flash-image" \
            ENV="production" \
            LOG_LEVEL="INFO" \
            --stage

      - name: Deploy backend
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.production.toml \
            --build-target production \
            --wait-timeout 300

      - name: Smoke test
        run: |
          sleep 10
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-connrefused \
            https://api.personacomposer.app/health

  frontend-deploy:
    name: Frontend deploy (Fly.io)
    runs-on: ubuntu-latest
    if: vars.DEPLOY_TARGET == 'fly'

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy frontend
        working-directory: frontend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.production.toml \
            --build-target production \
            --wait-timeout 300

      - name: Smoke test
        run: |
          sleep 10
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-connrefused \
            https://personacomposer.app

  smoke-tests:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: [backend-deploy, frontend-deploy]
    if: needs.backend-deploy.result == 'success' && needs.frontend-deploy.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smoke-tests/package-lock.json

      - name: Install dependencies
        working-directory: smoke-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: smoke-tests
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        working-directory: smoke-tests
        env:
          SMOKE_TEST_BASE_URL: https://personacomposer.app
          SMOKE_TEST_API_URL: https://api.personacomposer.app
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMOKE_TEST_USER_ID: ${{ secrets.SMOKE_TEST_USER_ID }}
          SMOKE_TEST_ADMIN_USER_ID: ${{ secrets.SMOKE_TEST_ADMIN_USER_ID }}
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-tests/playwright-report/
          retention-days: 7

  deployment-status:
    name: Update deployment status
    runs-on: ubuntu-latest
    needs: [backend-deploy, frontend-deploy, smoke-tests]
    if: always() && vars.DEPLOY_TARGET == 'fly'

    steps:
      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'Fly.io production deploy',
            });

            const backendResult = '${{ needs.backend-deploy.result }}';
            const frontendResult = '${{ needs.frontend-deploy.result }}';
            const smokeResult = '${{ needs.smoke-tests.result }}';
            const allSuccess = backendResult === 'success' && frontendResult === 'success' && smokeResult === 'success';

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: allSuccess ? 'success' : 'failure',
              environment_url: allSuccess ? 'https://personacomposer.app' : undefined,
              description: allSuccess
                ? 'Deployed to Fly.io (smoke tests passed)'
                : `Deploy failed (backend: ${backendResult}, frontend: ${frontendResult}, smoke: ${smokeResult})`,
            });

name: Backend CI + Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - '**'

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      JWT_SECRET: test-secret
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -q

      - name: Run tests
        run: pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=85

  deploy:
    name: Build, push & deploy backend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --target production \
            -t $ECR_REGISTRY/persona-composer/backend:latest \
            -t $ECR_REGISTRY/persona-composer/backend:$IMAGE_TAG \
            ./backend
          docker push $ECR_REGISTRY/persona-composer/backend:latest
          docker push $ECR_REGISTRY/persona-composer/backend:$IMAGE_TAG

      - name: Deploy backend service to ECS
        run: |
          aws ecs update-service \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            --cluster persona-composer-cluster \
            --service persona-composer-backend \
            --force-new-deployment \
            --query 'service.{name:serviceName,status:status}'

name: Frontend CI + Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - '**'

jobs:
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        env:
          NEXT_PUBLIC_API_URL: https://api.personacomposer.app
        run: npm run build

  frontend-deploy:
    name: Frontend deploy
    runs-on: ubuntu-latest
    needs: frontend-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_TARGET != 'fly'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=https://api.personacomposer.app \
            -t $ECR_REGISTRY/persona-composer/frontend:latest \
            -t $ECR_REGISTRY/persona-composer/frontend:$IMAGE_TAG \
            ./frontend
          docker push $ECR_REGISTRY/persona-composer/frontend:latest
          docker push $ECR_REGISTRY/persona-composer/frontend:$IMAGE_TAG

      - name: Deploy frontend service to ECS
        run: |
          aws ecs update-service \
            --region us-east-1 \
            --cluster persona-composer-cluster \
            --service persona-composer-frontend \
            --force-new-deployment \
            --query 'service.{name:serviceName,status:status}'

      - name: Wait for deployment to stabilise
        run: |
          echo "Waiting for new tasks to be healthy and old tasks to be deprovisioned..."
          aws ecs wait services-stable \
            --region us-east-1 \
            --cluster persona-composer-cluster \
            --services persona-composer-frontend
          echo "Service stable."

      - name: Smoke test
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-connrefused \
            https://personacomposer.app

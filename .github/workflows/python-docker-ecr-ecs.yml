name: Backend Deploy (manual)

# Manual-only trigger — backend is deployed automatically by python-ci.yml on push to main.
# Use this for emergency re-deploys without re-running tests.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build, push & deploy backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --target production \
            -t $ECR_REGISTRY/persona-composer/backend:latest \
            -t $ECR_REGISTRY/persona-composer/backend:$IMAGE_TAG \
            ./backend
          docker push $ECR_REGISTRY/persona-composer/backend:latest
          docker push $ECR_REGISTRY/persona-composer/backend:$IMAGE_TAG

      - name: Deploy backend service to ECS
        run: |
          aws ecs update-service \
            --region ${{ secrets.AWS_DEFAULT_REGION }} \
            --cluster persona-composer-cluster \
            --service persona-composer-backend \
            --force-new-deployment \
            --query 'service.{name:serviceName,status:status}'
